name: 百度搜索测试（YAML）
steps:
  - name: 打开百度
    action: 导航到 https://www.baidu.com，确认页面标题包含"百度"两字

  - name: 搜索关键词
    action: 在搜索框中输入"Playwright 自动化测试"，然后点击搜索按钮

  - name: 验证结果
    verify: 搜索结果页面正常加载，包含与搜索关键词相关的结果

  - name: 可选检查
    action: 检查页面是否有高级搜索链接
    on_failure: skip

  - name: 截图
    screenshot: search_result
