name: 抖音精选搜索（YAML + 配置文件）
steps:
  - name: 打开抖音精选首页
    action: 打开 https://www.douyin.com/jingxuan 首页
    screenshot: 01_homepage

  - name: 关闭登录弹窗
    action: 关闭页面上的登录弹窗
    screenshot: 02_homepage_clean

  - name: 输入搜索关键词
    action: 在页面顶部的搜索框中输入'陈伯全能王'
    screenshot: 03_keyword_typing

  - name: 确认搜索词
    verify: 页面顶部搜索框中显示文字'陈伯全能王'
    screenshot: 04_keyword_entered

  - name: 点击搜索按钮
    action: >
      先仔细观察页面结构，找到顶部导航区搜索框旁边的搜索按钮
      （不是左侧导航栏的搜索链接），然后点击它
    screenshot: 05_after_click_search

  - name: 验证登录弹窗
    verify: 页面上弹出了登录弹窗或登录浮窗
