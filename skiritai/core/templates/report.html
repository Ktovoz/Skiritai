<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Report — {{case_name}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  .header { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .header h1 { font-size: 22px; margin-bottom: 12px; }
  .meta { display: flex; gap: 24px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  .meta-label { color: #888; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
  .badge-pass { background: #e6f7e6; color: #1a7d1a; }
  .badge-fail { background: #fde8e8; color: #c41e1e; }
  .steps { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .steps-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #eee; }
  .steps-header h2 { font-size: 16px; }
  .step-row { display: grid; grid-template-columns: 40px 1fr 80px 80px; align-items: center; gap: 12px; padding: 12px 24px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .step-row:last-child { border-bottom: none; }
  .step-num { color: #999; }
  .step-name { font-weight: 500; }
  .step-mode { color: #888; font-size: 13px; }
  .step-status { text-align: right; }
  .step-icon { font-size: 16px; }
  .step-summary { grid-column: 1 / -1; color: #666; font-size: 13px; padding-top: 4px; }
  .failures { background: #fff; border-radius: 8px; padding: 24px; margin-top: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .failures h2 { color: #c41e1e; font-size: 16px; margin-bottom: 12px; }
  .failure-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .failure-item:last-child { border-bottom: none; }
  .footer { text-align: center; color: #aaa; font-size: 12px; margin-top: 24px; }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>{{case_name}}</h1>
  <div class="meta">
    <div class="meta-item"><span class="meta-label">Status:</span><span class="badge {{status_badge_class}}">{{status}}</span></div>
    <div class="meta-item"><span class="meta-label">Steps:</span><span>{{success_count}} / {{total_steps}} passed</span></div>
    <div class="meta-item"><span class="meta-label">Elapsed:</span><span>{{elapsed}}</span></div>
  </div>
</div>

<div class="steps">
  <div class="steps-header">
    <h2>Steps</h2>
    <span style="color:#888;font-size:13px">{{passed_count}} passed, {{failed_count}} failed</span>
  </div>
  {{step_rows}}
</div>

{{failures_section}}

<div class="footer">Generated by Skiritai</div>

</div>
</body>
</html>
