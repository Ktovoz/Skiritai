<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Report — {{case_name}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; padding: 24px; }
  .container { max-width: 960px; margin: 0 auto; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 12px; padding: 28px 32px; margin-bottom: 20px; }
  .header h1 { font-size: 24px; margin-bottom: 16px; font-weight: 700; }
  .meta { display: flex; gap: 28px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 8px; font-size: 14px; opacity: 0.95; }
  .meta-label { opacity: 0.75; }
  .badge { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; }
  .badge-pass { background: rgba(255,255,255,.25); color: #fff; }
  .badge-fail { background: rgba(255,80,80,.35); color: #fff; }
  .summary-bar { background: #fff; border-radius: 10px; padding: 20px 28px; margin-bottom: 20px; display: flex; gap: 32px; flex-wrap: wrap; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stat { text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  .stat-pass .stat-num { color: #1a7d1a; }
  .stat-fail .stat-num { color: #c41e1e; }
  .stat-time .stat-num { color: #555; font-size: 22px; }
  .step-card { background: #fff; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
  .step-header { display: flex; align-items: center; gap: 14px; padding: 16px 24px; cursor: pointer; }
  .step-header:hover { background: #fafafa; }
  .step-num { font-size: 13px; color: #999; min-width: 32px; }
  .step-name { font-weight: 600; flex: 1; font-size: 15px; }
  .step-mode { font-size: 12px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
  .step-status { font-weight: 600; font-size: 13px; }
  .step-status.pass { color: #1a7d1a; }
  .step-status.fail { color: #c41e1e; }
  .step-time { font-size: 12px; color: #aaa; min-width: 55px; text-align: right; }
  .step-body { border-top: 1px solid #f0f0f0; padding: 16px 24px; display: none; }
  .step-body.open { display: block; }
  .step-summary { font-size: 13px; color: #555; line-height: 1.6; white-space: pre-wrap; margin-bottom: 12px; }
  .verification-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 13px; }
  .verif-icon { font-weight: 700; min-width: 16px; }
  .verif-pass .verif-icon { color: #1a7d1a; }
  .verif-fail .verif-icon { color: #c41e1e; }
  .verif-reason { color: #777; font-size: 12px; margin-left: 24px; }
  .screenshots { margin-top: 10px; }
  .screenshots-title { font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .screenshot-thumb { display: inline-block; margin: 4px; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; max-width: 280px; vertical-align: top; }
  .screenshot-thumb img { width: 100%; display: block; }
  .screenshot-label { font-size: 11px; color: #888; padding: 4px 8px; background: #fafafa; text-align: center; }
  .failures-section { background: #fff; border-radius: 10px; padding: 24px 28px; margin-top: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .failures-section h2 { color: #c41e1e; font-size: 16px; margin-bottom: 14px; }
  .failure-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .failure-item:last-child { border-bottom: none; }
  .footer { text-align: center; color: #bbb; font-size: 12px; margin-top: 28px; }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>{{case_name}}</h1>
  <div class="meta">
    <div class="meta-item"><span class="meta-label">Status:</span><span class="badge {{status_badge_class}}">{{status}}</span></div>
    <div class="meta-item"><span class="meta-label">Steps:</span><span>{{success_count}} / {{total_steps}} passed</span></div>
    <div class="meta-item"><span class="meta-label">Total:</span><span>{{elapsed}}</span></div>
  </div>
</div>

<div class="summary-bar">
  <div class="stat stat-pass"><div class="stat-num">{{passed_count}}</div><div class="stat-label">Passed</div></div>
  <div class="stat stat-fail"><div class="stat-num">{{failed_count}}</div><div class="stat-label">Failed</div></div>
  <div class="stat stat-time"><div class="stat-num">{{verification_summary}}</div><div class="stat-label">Assertions</div></div>
  <div class="stat stat-time"><div class="stat-num">{{total_elapsed}}</div><div class="stat-label">Total Time</div></div>
</div>

{{step_cards}}

{{failures_section}}

<div class="footer">Generated by Skiritai</div>

</div>
<script>
document.querySelectorAll('.step-header').forEach(h => {
  h.addEventListener('click', () => h.nextElementSibling.classList.toggle('open'));
});
</script>
</body>
</html>
