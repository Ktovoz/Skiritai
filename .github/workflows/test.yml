name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Inject secrets as env vars for LLM-dependent tests
env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}
  CI: "true"

jobs:
  # ============================================================
  # Unit tests: 纯逻辑测试，不需要外部依赖，最快反馈
  # ============================================================
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package with dev deps
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v -s --tb=short

  # ============================================================
  # Functional + Acceptance: Agent 逻辑 + 脚本级验证
  # ============================================================
  functional-and-acceptance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package with dev + web deps
        run: |
          pip install -e ".[dev,web]"

      - name: Run functional tests
        run: python -m pytest tests/functional/ -v -s --tb=short

      - name: Run acceptance tests
        run: python -m pytest tests/acceptance/ -v -s --tb=short

  # ============================================================
  # E2E: 真实浏览器测试 (Playwright Chromium headless)
  # ============================================================
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install package with dev + web deps
        run: |
          pip install -e ".[dev,web]"
          playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          HEADLESS: "true"
        run: python -m pytest tests/e2e/ -v -s --tb=short

  # ============================================================
  # Coverage: 汇总覆盖率报告（在所有测试完成后运行）
  # ============================================================
  coverage:
    needs: [ unit, functional-and-acceptance, e2e ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install package with dev + web deps
        run: |
          pip install -e ".[dev,web]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run all tests with coverage
        env:
          HEADLESS: "true"
        run: |
          python -m pytest tests/unit/ tests/functional/ tests/acceptance/ tests/e2e/ \
            --cov=skiritai \
            --cov-report=term \
            --cov-report=html \
            --cov-report=xml \
            -v -s --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
