name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # ============================================================
  # Validate: 校验 tag 版本类型与分支匹配
  #   develop 分支 → 只允许预发布版 (a/b/rc)
  #   main 分支    → 只允许正式版
  # ============================================================
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ (a|b|rc)[0-9]*$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release detected: v$TAG"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Stable release detected: v$TAG"
          fi

      - name: Validate tag matches branch rules
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          IS_PRERELEASE="${{ steps.tag.outputs.is_prerelease }}"
          BRANCH=$(git branch -r --contains "$GITHUB_SHA" 2>/dev/null | grep -E 'origin/(main|develop)$' | head -1 | sed 's|.*origin/||')

          # Fallback: on tag push (detached HEAD), infer branch from tag convention
          #   v*-a* / v*-b* / v*-rc* → develop
          #   else → main
          if [ -z "$BRANCH" ]; then
            if [[ "$TAG_VERSION" =~ (a|b|rc)[0-9]*$ ]]; then
              BRANCH="develop"
            else
              BRANCH="main"
            fi
            echo "::notice::Detached HEAD, inferred branch from tag: $BRANCH"
          fi

          echo "Tag: v$TAG_VERSION"
          echo "Branch: $BRANCH"
          echo "Is prerelease: $IS_PRERELEASE"

          if [ "$BRANCH" = "develop" ] && [ "$IS_PRERELEASE" = "false" ]; then
            echo "::error::develop branch only allows pre-release tags (a/b/rc), got v$TAG_VERSION"
            exit 1
          fi

          if [ "$BRANCH" = "main" ] && [ "$IS_PRERELEASE" = "true" ]; then
            echo "::error::main branch only allows stable tags, got v$TAG_VERSION"
            exit 1
          fi

          echo "Tag validation passed"

  # ============================================================
  # Test: 运行测试套件，防止发布有问题的版本
  # ============================================================
  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install with dev deps
        run: uv sync --python "3.12"

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

  # ============================================================
  # Build: 构建并检查包
  # ============================================================
  build:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Check package
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================================
  # PyPI: 发布到正式 PyPI
  # ============================================================
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
